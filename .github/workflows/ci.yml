name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build, typecheck, test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20.x', '22.x']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (tsup)
        run: npm run build

      - name: Verify dist/ shape
        run: |
          test -f dist/index.js
          test -f dist/index.cjs
          test -f dist/index.d.ts
          test -f dist/index.d.cts
          test -f dist/next/tts-handler.js
          test -f dist/next/stt-handler.js
          test -f dist/next/convai-handler.js
          test -f dist/react/index.js
          echo "✓ all expected dist/ files emitted"

      - name: Verify server entry has no React imports
        # Critical regression guard — the server entry must never pull React
        # into the import graph. Otherwise consumers using @itsocialist/voice
        # in a Node-only context (Workers, plain Node ESM) would fail.
        run: |
          if grep -qE 'require\(["'"'"']react["'"'"']\)|from\s+["'"'"']react["'"'"']' dist/index.cjs dist/index.js; then
            echo "✗ FAIL: server entry pulls React into the module graph"
            exit 1
          fi
          echo "✓ server entry is clean of React"

      - name: Smoke test ESM consumer
        run: |
          mkdir -p /tmp/smoke && cd /tmp/smoke
          npm init -y > /dev/null
          npm install $GITHUB_WORKSPACE > /dev/null
          cat > test.mjs <<'EOF'
          import {
            ELEVENLABS_MODELS,
            createConvAIAgent,
            voiceRegistry,
            ConvAIError,
            createConvAI,
            elevenlabs,
            hume,
            startConvAISession,
            endConvAISession,
            synthesizeSpeech,
            synthesizeSpeechStream,
            getProviderStatus,
          } from '@itsocialist/voice';
          // v0.3.0 surface
          if (typeof createConvAIAgent !== 'function') throw new Error('createConvAIAgent missing');
          if (typeof synthesizeSpeech !== 'function') throw new Error('synthesizeSpeech missing');
          if (typeof synthesizeSpeechStream !== 'function') throw new Error('synthesizeSpeechStream missing');
          // v0.2.3 surface
          if (!ELEVENLABS_MODELS.FLASH_V2_5) throw new Error('FLASH_V2_5 missing');
          if (!voiceRegistry) throw new Error('voiceRegistry missing');
          // v0.3.1 surface — typed error
          if (typeof ConvAIError !== 'function') throw new Error('ConvAIError missing');
          // v0.3.2 surface — getProviderStatus non-throwing with no env keys
          const status = getProviderStatus();
          if (status.primary !== null && !Array.isArray(status.available))
            throw new Error('getProviderStatus shape wrong');
          // v0.3.3 surface — ConvAI backend abstraction
          if (typeof createConvAI !== 'function') throw new Error('createConvAI missing');
          if (typeof elevenlabs !== 'function') throw new Error('elevenlabs factory missing');
          if (typeof startConvAISession !== 'function') throw new Error('startConvAISession missing');
          if (typeof endConvAISession !== 'function') throw new Error('endConvAISession missing');
          const elBackend = elevenlabs({ apiKey: 'fake' });
          if (elBackend.id !== 'elevenlabs') throw new Error('elevenlabs.id mismatch');
          // v0.4.0 surface — Hume backend
          if (typeof hume !== 'function') throw new Error('hume factory missing');
          const humeBackend = hume({ apiKey: 'fake', secretKey: 'fake' });
          if (humeBackend.id !== 'hume') throw new Error('hume.id mismatch');
          // Provider-neutral verbs accept the backend object
          const convai = createConvAI({ backend: humeBackend });
          if (convai.backend !== 'hume') throw new Error('createConvAI dispatch wrong');
          console.log('✓ ESM consumer ok (v0.4.0 surface)');
          EOF
          node test.mjs

      - name: Smoke test CJS consumer
        run: |
          cd /tmp/smoke
          cat > test.cjs <<'EOF'
          const { ELEVENLABS_MODELS, createConvAIAgent, createConvAI, hume, elevenlabs } = require('@itsocialist/voice');
          if (typeof createConvAIAgent !== 'function') throw new Error('createConvAIAgent missing');
          if (!ELEVENLABS_MODELS.FLASH_V2_5) throw new Error('FLASH_V2_5 missing');
          if (typeof createConvAI !== 'function') throw new Error('createConvAI missing');
          if (typeof elevenlabs !== 'function') throw new Error('elevenlabs missing');
          if (typeof hume !== 'function') throw new Error('hume missing');
          console.log('✓ CJS consumer ok (v0.4.0 surface)');
          EOF
          node test.cjs

      - name: Smoke test deep imports (Next handlers)
        run: |
          cd /tmp/smoke
          cat > deep.mjs <<'EOF'
          import { POST as ttsPost } from '@itsocialist/voice/next/tts-handler';
          import { POST as sttPost } from '@itsocialist/voice/next/stt-handler';
          import { POST as convaiPost, DELETE as convaiDelete } from '@itsocialist/voice/next/convai-handler';
          if (typeof ttsPost !== 'function') throw new Error('ttsPost missing');
          if (typeof sttPost !== 'function') throw new Error('sttPost missing');
          if (typeof convaiPost !== 'function') throw new Error('convaiPost missing');
          if (typeof convaiDelete !== 'function') throw new Error('convaiDelete missing');
          console.log('✓ deep imports ok');
          EOF
          node deep.mjs

      - name: Run vitest
        # Honest CI as of v0.4.0.1: vitest failures block the build. Coverage
        # is still thin (3 files, 27 tests) — v0.4.2 adds ConvAI client + hook
        # + Hume backend tests — but at least every test that exists must pass.
        run: npm run test:run
