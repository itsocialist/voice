name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build, typecheck, test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20.x', '22.x']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (tsup)
        run: npm run build

      - name: Verify dist/ shape
        run: |
          test -f dist/index.js
          test -f dist/index.cjs
          test -f dist/index.d.ts
          test -f dist/index.d.cts
          test -f dist/next/tts-handler.js
          test -f dist/next/stt-handler.js
          test -f dist/next/convai-handler.js
          test -f dist/react/index.js
          echo "✓ all expected dist/ files emitted"

      - name: Verify server entry has no React imports
        # Critical regression guard — the server entry must never pull React
        # into the import graph. Otherwise consumers using @itsocialist/voice
        # in a Node-only context (Workers, plain Node ESM) would fail.
        run: |
          if grep -qE 'require\(["'"'"']react["'"'"']\)|from\s+["'"'"']react["'"'"']' dist/index.cjs dist/index.js; then
            echo "✗ FAIL: server entry pulls React into the module graph"
            exit 1
          fi
          echo "✓ server entry is clean of React"

      - name: Smoke test ESM consumer
        run: |
          mkdir -p /tmp/smoke && cd /tmp/smoke
          npm init -y > /dev/null
          npm install $GITHUB_WORKSPACE > /dev/null
          cat > test.mjs <<'EOF'
          import { ELEVENLABS_MODELS, createConvAIAgent, voiceRegistry } from '@itsocialist/voice';
          if (typeof createConvAIAgent !== 'function') throw new Error('createConvAIAgent missing');
          if (!ELEVENLABS_MODELS.FLASH_V2_5) throw new Error('FLASH_V2_5 missing');
          if (!voiceRegistry) throw new Error('voiceRegistry missing');
          console.log('✓ ESM consumer ok');
          EOF
          node test.mjs

      - name: Smoke test CJS consumer
        run: |
          cd /tmp/smoke
          cat > test.cjs <<'EOF'
          const { ELEVENLABS_MODELS, createConvAIAgent } = require('@itsocialist/voice');
          if (typeof createConvAIAgent !== 'function') throw new Error('createConvAIAgent missing');
          if (!ELEVENLABS_MODELS.FLASH_V2_5) throw new Error('FLASH_V2_5 missing');
          console.log('✓ CJS consumer ok');
          EOF
          node test.cjs

      - name: Smoke test deep imports (Next handlers)
        run: |
          cd /tmp/smoke
          cat > deep.mjs <<'EOF'
          import { POST as ttsPost } from '@itsocialist/voice/next/tts-handler';
          import { POST as sttPost } from '@itsocialist/voice/next/stt-handler';
          import { POST as convaiPost, DELETE as convaiDelete } from '@itsocialist/voice/next/convai-handler';
          if (typeof ttsPost !== 'function') throw new Error('ttsPost missing');
          if (typeof sttPost !== 'function') throw new Error('sttPost missing');
          if (typeof convaiPost !== 'function') throw new Error('convaiPost missing');
          if (typeof convaiDelete !== 'function') throw new Error('convaiDelete missing');
          console.log('✓ deep imports ok');
          EOF
          node deep.mjs

      - name: Run vitest
        run: npm run test:run
        continue-on-error: true
        # vitest is currently thin coverage (3 files); don't fail CI on test
        # failures yet. Flip continue-on-error to false in v0.3.x once
        # coverage is up.
